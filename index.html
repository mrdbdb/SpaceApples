<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Poops 3D: Super Edition</title>
    <style>
        :root {
            --primary: #ff3333;
            --secondary: #00f2ff;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #fff;
            color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        canvas { display: block; }

        #ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .stats-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        #score-board {
            font-size: 28px;
            font-weight: 900;
            text-shadow: 0 0 10px rgba(0,0,0,0.2);
            font-family: 'Courier New', Courier, monospace;
            color: #111;
        }

        .life-container { display: flex; gap: 10px; }

        .life-icon {
            width: 20px; height: 20px;
            background: var(--primary);
            clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 50% 75%, 18% 100%, 0% 38%);
            filter: drop-shadow(0 0 5px var(--primary));
        }

        #upgrade-msg {
            position: absolute;
            top: 20%; left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            color: var(--secondary);
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--secondary);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            text-align: center;
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: clamp(40px, 8vw, 80px);
            margin: 0;
            color: var(--primary);
            text-shadow: 0 0 30px var(--primary);
            letter-spacing: 10px;
            font-weight: 900;
        }

        .subtitle {
            color: #888;
            margin: 10px 0 30px;
            font-size: 14px;
            text-align: center;
            line-height: 1.6;
        }

        .start-btn {
            background: transparent;
            color: #111;
            border: 2px solid var(--primary);
            padding: 15px 50px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .start-btn:hover {
            background: var(--primary);
            box-shadow: 0 0 30px var(--primary);
        }

        #mobile-controls {
            display: none;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: auto;
            width: 100%;
            padding: 0 10px 24px;
            box-sizing: border-box;
        }

        #dpad { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .dpad-row { display: flex; gap: 8px; }

        .dpad-btn {
            width: 80px; height: 80px;
            background: rgba(255,255,255,0.07);
            border: 2px solid rgba(255,255,255,0.25);
            border-radius: 14px;
            display: flex;
            justify-content: center; align-items: center;
            color: #111; font-size: 30px;
            backdrop-filter: blur(5px);
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .dpad-btn:active {
            background: rgba(255, 51, 51, 0.3);
            border-color: var(--primary);
            transform: scale(0.92);
        }

        #btn-fire {
            width: 120px; height: 120px;
            border-radius: 50%;
            border-color: var(--secondary);
            color: var(--secondary);
            font-size: 44px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        #btn-fire:active {
            background: rgba(0, 242, 255, 0.2);
            border-color: var(--secondary);
            box-shadow: 0 0 30px var(--secondary);
        }

        @media (pointer: coarse) {
            #mobile-controls { display: flex; }
            .subtitle { font-size: 12px; }
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="stats-container">
            <div id="score-board">SCORE: <span id="score">0000</span></div>
            <div class="life-container" id="lives">
                <div class="life-icon"></div>
                <div class="life-icon"></div>
                <div class="life-icon"></div>
            </div>
        </div>

        <div id="upgrade-msg">TRIPLE SHOT UNLOCKED</div>

        <div id="mobile-controls">
            <div id="dpad">
                <div class="dpad-btn" id="btn-thrust">&#9650;</div>
                <div class="dpad-row">
                    <div class="dpad-btn" id="btn-left">&#9664;</div>
                    <div class="dpad-btn" id="btn-right">&#9654;</div>
                </div>
            </div>
            <div id="fire-group">
                <div class="dpad-btn" id="btn-fire">&#9678;</div>
            </div>
        </div>
    </div>

    <div id="overlay">
        <h1 id="main-title">SPACE POOPS 3D</h1>
        <p class="subtitle">
            THE POOPS ARE SPREADING. DESTROY THEM ALL.<br>
            <span style="color: var(--secondary)">3K: Double | 8K: Triple</span><br><br>
            DESKTOP: Arrows + Space | MOBILE: Touch Controls
        </p>
        <button class="start-btn" onclick="startGame()">INITIATE SYSTEM</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- Globals ---
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const overlay = document.getElementById('overlay');
        const upgradeMsg = document.getElementById('upgrade-msg');

        let score = 0, lives = 3, gameActive = false, shake = 0;
        const input = { left: false, right: false, up: false, shoot: false };

        // Arena bounds
        const ARENA = 600;
        const ARENA_HALF = ARENA / 2;

        // --- Three.js Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        scene.fog = new THREE.FogExp2(0xffffff, 0.0008);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 5000);
        camera.position.set(0, 120, 200);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.body.insertBefore(renderer.domElement, document.body.firstChild);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x888899, 0.8);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(100, 200, 100);
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0xff3333, 1, 500);
        pointLight.position.set(0, 50, 0);
        scene.add(pointLight);

        // --- Starfield ---
        function createStarfield() {
            const geo = new THREE.BufferGeometry();
            const positions = [];
            for (let i = 0; i < 3000; i++) {
                positions.push(
                    (Math.random() - 0.5) * 4000,
                    (Math.random() - 0.5) * 2000,
                    (Math.random() - 0.5) * 4000
                );
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            const mat = new THREE.PointsMaterial({ color: 0x000000, size: 1.5, sizeAttenuation: true });
            const stars = new THREE.Points(geo, mat);
            scene.add(stars);
            return stars;
        }
        const starfield = createStarfield();

        // --- Grid Floor ---
        function createGrid() {
            const gridGroup = new THREE.Group();
            const gridMat = new THREE.LineBasicMaterial({ color: 0xccccdd, transparent: true, opacity: 0.5 });
            const step = 50;
            for (let i = -ARENA_HALF; i <= ARENA_HALF; i += step) {
                const geoH = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(i, 0, -ARENA_HALF),
                    new THREE.Vector3(i, 0, ARENA_HALF)
                ]);
                gridGroup.add(new THREE.Line(geoH, gridMat));
                const geoV = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(-ARENA_HALF, 0, i),
                    new THREE.Vector3(ARENA_HALF, 0, i)
                ]);
                gridGroup.add(new THREE.Line(geoV, gridMat));
            }
            scene.add(gridGroup);

            // Arena boundary glow
            const borderGeo = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(-ARENA_HALF, 0, -ARENA_HALF),
                new THREE.Vector3(ARENA_HALF, 0, -ARENA_HALF),
                new THREE.Vector3(ARENA_HALF, 0, ARENA_HALF),
                new THREE.Vector3(-ARENA_HALF, 0, ARENA_HALF),
                new THREE.Vector3(-ARENA_HALF, 0, -ARENA_HALF),
            ]);
            const borderMat = new THREE.LineBasicMaterial({ color: 0xff3333, transparent: true, opacity: 0.3 });
            scene.add(new THREE.Line(borderGeo, borderMat));

            return gridGroup;
        }
        const grid = createGrid();

        // --- Ship ---
        let shipMesh, shipGroup;

        function createShip() {
            shipGroup = new THREE.Group();

            // Fuselage
            const bodyGeo = new THREE.ConeGeometry(5, 20, 4);
            bodyGeo.rotateX(Math.PI / 2);
            const bodyMat = new THREE.MeshPhongMaterial({
                color: 0xcccccc,
                emissive: 0x222222,
                shininess: 80,
                flatShading: true
            });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            shipGroup.add(body);

            // Wings
            const wingGeo = new THREE.BoxGeometry(30, 1, 8);
            const wingMat = new THREE.MeshPhongMaterial({
                color: 0x888888,
                emissive: 0x111111,
                flatShading: true
            });
            const wings = new THREE.Mesh(wingGeo, wingMat);
            wings.position.z = 3;
            shipGroup.add(wings);

            // Engine glow
            const engineGeo = new THREE.SphereGeometry(2, 8, 8);
            const engineMat = new THREE.MeshBasicMaterial({ color: 0xff3333 });
            const engine = new THREE.Mesh(engineGeo, engineMat);
            engine.position.z = 10;
            engine.name = 'engine';
            shipGroup.add(engine);

            // Engine light
            const engineLight = new THREE.PointLight(0xff3333, 0.5, 30);
            engineLight.position.z = 12;
            engineLight.name = 'engineLight';
            shipGroup.add(engineLight);

            shipGroup.position.y = 10;
            scene.add(shipGroup);
            return shipGroup;
        }

        // --- Ship State ---
        const shipState = {
            x: 0, z: 0,
            angle: 0,
            vx: 0, vz: 0,
            radius: 8,
            cooldown: 0,
            invul: 120,
            reset() {
                this.x = 0; this.z = 0;
                this.angle = 0;
                this.vx = 0; this.vz = 0;
                this.cooldown = 0;
                this.invul = 120;
            }
        };

        // --- Bullets ---
        const bullets = [];
        const bulletPool = [];

        function createBulletMesh(color) {
            const geo = new THREE.SphereGeometry(1.5, 8, 8);
            const mat = new THREE.MeshBasicMaterial({ color });
            const mesh = new THREE.Mesh(geo, mat);

            // Glow
            const glowGeo = new THREE.SphereGeometry(3, 8, 8);
            const glowMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.3 });
            const glow = new THREE.Mesh(glowGeo, glowMat);
            mesh.add(glow);

            mesh.position.y = 10;
            scene.add(mesh);
            return mesh;
        }

        function fireBullet(x, z, angle, color) {
            const mesh = createBulletMesh(color);
            mesh.position.set(x, 10, z);
            bullets.push({
                mesh,
                vx: -Math.sin(angle) * 5,
                vz: -Math.cos(angle) * 5,
                life: 120
            });
        }

        // --- Poops ---
        const poops = [];

        function createPoopMesh(size) {
            const group = new THREE.Group();
            const brown = 0x8B4513;
            const lightBrown = 0xA0522D;
            const darkBrown = 0x5C2E00;
            const r = size * 5;

            // Bottom blob
            const bottomGeo = new THREE.SphereGeometry(r * 0.9, 12, 8);
            bottomGeo.scale(1, 0.6, 1);
            const bottomMat = new THREE.MeshPhongMaterial({ color: brown, flatShading: true });
            const bottom = new THREE.Mesh(bottomGeo, bottomMat);
            bottom.position.y = 0;
            group.add(bottom);

            // Middle blob
            const midGeo = new THREE.SphereGeometry(r * 0.7, 12, 8);
            midGeo.scale(1, 0.65, 1);
            const midMat = new THREE.MeshPhongMaterial({ color: lightBrown, flatShading: true });
            const mid = new THREE.Mesh(midGeo, midMat);
            mid.position.y = r * 0.5;
            group.add(mid);

            // Top blob
            const topGeo = new THREE.SphereGeometry(r * 0.45, 10, 8);
            topGeo.scale(1, 0.7, 1);
            const topMat = new THREE.MeshPhongMaterial({ color: brown, flatShading: true });
            const top = new THREE.Mesh(topGeo, topMat);
            top.position.y = r * 0.9;
            group.add(top);

            // Tip
            const tipGeo = new THREE.SphereGeometry(r * 0.2, 8, 6);
            const tipMat = new THREE.MeshPhongMaterial({ color: darkBrown, flatShading: true });
            const tip = new THREE.Mesh(tipGeo, tipMat);
            tip.position.y = r * 1.2;
            group.add(tip);

            group.position.y = 10;
            scene.add(group);
            return group;
        }

        function spawnPoop(x, z, size) {
            size = size || 3;
            const radius = size * 7;
            if (x === undefined) {
                // Spawn at arena edge
                const side = Math.floor(Math.random() * 4);
                if (side === 0) { x = -ARENA_HALF; z = Math.random() * ARENA - ARENA_HALF; }
                else if (side === 1) { x = ARENA_HALF; z = Math.random() * ARENA - ARENA_HALF; }
                else if (side === 2) { z = -ARENA_HALF; x = Math.random() * ARENA - ARENA_HALF; }
                else { z = ARENA_HALF; x = Math.random() * ARENA - ARENA_HALF; }
            }
            const angle = Math.random() * Math.PI * 2;
            const speed = (4 - size) * 0.4;
            const mesh = createPoopMesh(size);
            mesh.position.set(x, 10, z);
            poops.push({
                mesh, x, z, size, radius,
                vx: Math.cos(angle) * speed,
                vz: Math.sin(angle) * speed,
                rotSpeed: (Math.random() - 0.5) * 0.03
            });
        }

        // --- Particles ---
        const particleSystems = [];

        function spawnExplosion(x, z, color, count) {
            const positions = [];
            const velocities = [];
            for (let i = 0; i < count; i++) {
                positions.push(x, 10, z);
                velocities.push(
                    (Math.random() - 0.5) * 4,
                    Math.random() * 3,
                    (Math.random() - 0.5) * 4
                );
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            const mat = new THREE.PointsMaterial({
                color,
                size: 3,
                transparent: true,
                opacity: 1,
                sizeAttenuation: true
            });
            const points = new THREE.Points(geo, mat);
            scene.add(points);
            particleSystems.push({ points, velocities, life: 60, maxLife: 60 });
        }

        // --- Exhaust Trail ---
        function spawnExhaust(x, z, angle) {
            if (Math.random() > 0.4) return;
            const positions = [];
            const velocities = [];
            for (let i = 0; i < 3; i++) {
                positions.push(x + Math.sin(angle) * 8, 10, z + Math.cos(angle) * 8);
                velocities.push(
                    Math.sin(angle) * 2 + (Math.random() - 0.5),
                    (Math.random() - 0.5),
                    Math.cos(angle) * 2 + (Math.random() - 0.5)
                );
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            const mat = new THREE.PointsMaterial({
                color: 0xff3333,
                size: 2.5,
                transparent: true,
                opacity: 1,
                sizeAttenuation: true
            });
            const points = new THREE.Points(geo, mat);
            scene.add(points);
            particleSystems.push({ points, velocities, life: 25, maxLife: 25 });
        }

        // --- Wrap Position ---
        function wrap(val) {
            if (val < -ARENA_HALF) return val + ARENA;
            if (val > ARENA_HALF) return val - ARENA;
            return val;
        }

        // --- Controls ---
        function handleInput(key, state) {
            if (key === 'ArrowLeft' || key === 'KeyA') input.left = state;
            if (key === 'ArrowRight' || key === 'KeyD') input.right = state;
            if (key === 'ArrowUp' || key === 'KeyW') input.up = state;
            if (key === 'Space') input.shoot = state;
        }

        function setupControls() {
            window.addEventListener('keydown', e => handleInput(e.code, true));
            window.addEventListener('keyup', e => handleInput(e.code, false));

            const bindTouch = (id, action) => {
                const el = document.getElementById(id);
                el.addEventListener('touchstart', e => { e.preventDefault(); input[action] = true; }, { passive: false });
                el.addEventListener('touchend', e => { e.preventDefault(); input[action] = false; }, { passive: false });
                el.addEventListener('touchcancel', () => { input[action] = false; });
            };
            bindTouch('btn-left', 'left');
            bindTouch('btn-right', 'right');
            bindTouch('btn-thrust', 'up');
            bindTouch('btn-fire', 'shoot');
        }

        // --- Upgrades ---
        let upgradeMilestones = [];
        function checkUpgrades() {
            if (upgradeMilestones.length > 0 && score >= upgradeMilestones[0]) {
                const milestone = upgradeMilestones.shift();
                let msg = "DOUBLE SHOT";
                if (milestone === 3000) msg = "TRIPLE SHOT";
                upgradeMsg.innerText = msg;
                upgradeMsg.style.opacity = '1';
                setTimeout(() => upgradeMsg.style.opacity = '0', 2000);
            }
        }

        // --- Update Lives ---
        function updateLivesUI() {
            livesEl.innerHTML = '';
            for (let i = 0; i < lives; i++) {
                const l = document.createElement('div');
                l.className = 'life-icon';
                livesEl.appendChild(l);
            }
        }

        // --- Game Over ---
        function gameOver() {
            gameActive = false;
            overlay.style.display = 'flex';
            document.getElementById('main-title').innerText = "SYSTEM FAILED";
            document.querySelector('.subtitle').innerHTML =
                `FINAL SCORE: <span style="color:var(--primary)">${score}</span><br>THE POOPS HAVE OVERRUN THE SECTOR.`;
            document.querySelector('.start-btn').innerText = "REBOOT SYSTEM";
        }

        // --- Cleanup scene objects ---
        function cleanupGame() {
            bullets.forEach(b => scene.remove(b.mesh));
            bullets.length = 0;
            poops.forEach(p => scene.remove(p.mesh));
            poops.length = 0;
            particleSystems.forEach(p => scene.remove(p.points));
            particleSystems.length = 0;
            if (shipGroup) scene.remove(shipGroup);
        }

        // --- Start Game ---
        function startGame() {
            overlay.style.display = 'none';
            score = 0;
            lives = 3;
            gameActive = true;
            upgradeMilestones = [3000, 8000];
            updateLivesUI();
            scoreEl.innerText = '0000';

            cleanupGame();

            shipMesh = createShip();
            shipState.reset();

            for (let i = 0; i < 5; i++) spawnPoop();

            if (!loopRunning) {
                loopRunning = true;
                loop();
            }
        }

        // --- Main Loop ---
        let loopRunning = false;
        const clock = new THREE.Clock();

        function loop() {
            requestAnimationFrame(loop);

            if (!gameActive) {
                // Slowly rotate starfield for menu
                starfield.rotation.y += 0.0002;
                renderer.render(scene, camera);
                return;
            }

            const dt = Math.min(clock.getDelta(), 0.05);

            // --- Ship Update ---
            if (input.left) shipState.angle += 0.04;
            if (input.right) shipState.angle -= 0.04;

            if (input.up) {
                shipState.vx -= Math.sin(shipState.angle) * 0.15;
                shipState.vz -= Math.cos(shipState.angle) * 0.15;
                spawnExhaust(shipState.x, shipState.z, shipState.angle);

                // Engine glow
                const eng = shipGroup.getObjectByName('engine');
                const engL = shipGroup.getObjectByName('engineLight');
                if (eng) eng.scale.setScalar(1 + Math.random() * 0.5);
                if (engL) engL.intensity = 1 + Math.random();
            } else {
                const eng = shipGroup.getObjectByName('engine');
                const engL = shipGroup.getObjectByName('engineLight');
                if (eng) eng.scale.setScalar(0.5);
                if (engL) engL.intensity = 0.3;
            }

            shipState.x += shipState.vx;
            shipState.z += shipState.vz;
            shipState.vx *= 0.98;
            shipState.vz *= 0.98;

            // Wrap
            shipState.x = wrap(shipState.x);
            shipState.z = wrap(shipState.z);

            // Invulnerability
            if (shipState.invul > 0) shipState.invul--;
            if (shipState.cooldown > 0) shipState.cooldown--;

            // Update mesh
            shipGroup.position.set(shipState.x, 10, shipState.z);
            shipGroup.rotation.y = shipState.angle;

            // Blink during invul
            shipGroup.visible = !(shipState.invul > 0 && Math.floor(Date.now() / 100) % 2 === 0);

            // Ship glow based on upgrades
            const bodyMesh = shipGroup.children[0];
            if (score >= 8000) {
                bodyMesh.material.emissive.setHex(0x003344);
                bodyMesh.material.color.setHex(0x00f2ff);
            } else if (score >= 3000) {
                bodyMesh.material.emissive.setHex(0x002200);
                bodyMesh.material.color.setHex(0x44ff44);
            } else {
                bodyMesh.material.emissive.setHex(0x222222);
                bodyMesh.material.color.setHex(0xcccccc);
            }

            // --- Shooting ---
            if (input.shoot && shipState.cooldown <= 0) {
                const nx = shipState.x - Math.sin(shipState.angle) * 12;
                const nz = shipState.z - Math.cos(shipState.angle) * 12;

                if (score >= 8000) {
                    fireBullet(nx, nz, shipState.angle, 0x00f2ff);
                    fireBullet(nx, nz, shipState.angle - 0.2, 0x00f2ff);
                    fireBullet(nx, nz, shipState.angle + 0.2, 0x00f2ff);
                    shipState.cooldown = 14;
                } else if (score >= 3000) {
                    fireBullet(nx, nz, shipState.angle - 0.1, 0x44ff44);
                    fireBullet(nx, nz, shipState.angle + 0.1, 0x44ff44);
                    shipState.cooldown = 15;
                } else {
                    fireBullet(nx, nz, shipState.angle, 0x111111);
                    shipState.cooldown = 18;
                }
            }

            // --- Bullets Update ---
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.mesh.position.x += b.vx;
                b.mesh.position.z += b.vz;
                b.life--;

                // Wrap bullets
                b.mesh.position.x = wrap(b.mesh.position.x);
                b.mesh.position.z = wrap(b.mesh.position.z);

                if (b.life <= 0) {
                    scene.remove(b.mesh);
                    bullets.splice(i, 1);
                }
            }

            // --- Poop Spawning ---
            const maxPoops = score >= 8000 ? 20 : score >= 3000 ? 12 : 5 + Math.floor(score / 2000);
            const spawnRate = score >= 8000 ? 0.05 : score >= 3000 ? 0.035 : 0.02;
            if (poops.length < maxPoops) {
                if (Math.random() < spawnRate) spawnPoop();
            }

            // --- Poops Update ---
            for (let i = poops.length - 1; i >= 0; i--) {
                const a = poops[i];
                a.x += a.vx;
                a.z += a.vz;
                a.x = wrap(a.x);
                a.z = wrap(a.z);
                a.mesh.position.set(a.x, 10, a.z);
                a.mesh.rotation.y += a.rotSpeed;

                // Bob up and down
                a.mesh.position.y = 10 + Math.sin(Date.now() * 0.002 + i) * 2;

                // Bullet collision
                for (let j = bullets.length - 1; j >= 0; j--) {
                    const b = bullets[j];
                    const dx = a.x - b.mesh.position.x;
                    const dz = a.z - b.mesh.position.z;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    if (dist < a.radius + 3) {
                        // Hit!
                        spawnExplosion(a.x, a.z, 0x8B4513, a.size * 15);
                        shake = a.size * 3;

                        scene.remove(b.mesh);
                        bullets.splice(j, 1);

                        if (a.size > 1) {
                            spawnPoop(a.x, a.z, a.size - 1);
                            spawnPoop(a.x, a.z, a.size - 1);
                        }
                        scene.remove(a.mesh);
                        poops.splice(i, 1);

                        score += (4 - a.size) * 100;
                        scoreEl.innerText = score.toString().padStart(4, '0');
                        checkUpgrades();
                        break;
                    }
                }

                // Ship collision (re-check if poop still exists)
                if (i < poops.length && poops[i] === a && shipState.invul <= 0) {
                    const dx = a.x - shipState.x;
                    const dz = a.z - shipState.z;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    if (dist < a.radius + shipState.radius) {
                        lives--;
                        shake = 20;
                        spawnExplosion(shipState.x, shipState.z, 0xffffff, 50);
                        updateLivesUI();
                        if (lives <= 0) {
                            gameOver();
                        } else {
                            shipState.reset();
                        }
                    }
                }
            }

            // --- Particles Update ---
            for (let i = particleSystems.length - 1; i >= 0; i--) {
                const ps = particleSystems[i];
                ps.life--;
                ps.points.material.opacity = ps.life / ps.maxLife;

                const pos = ps.points.geometry.attributes.position.array;
                for (let j = 0; j < pos.length; j += 3) {
                    pos[j] += ps.velocities[j];
                    pos[j + 1] += ps.velocities[j + 1];
                    pos[j + 2] += ps.velocities[j + 2];
                    ps.velocities[j + 1] -= 0.02; // gravity
                }
                ps.points.geometry.attributes.position.needsUpdate = true;

                if (ps.life <= 0) {
                    scene.remove(ps.points);
                    ps.points.geometry.dispose();
                    ps.points.material.dispose();
                    particleSystems.splice(i, 1);
                }
            }

            // --- Camera Follow ---
            const camTargetX = shipState.x + Math.sin(shipState.angle) * 30;
            const camTargetZ = shipState.z + Math.cos(shipState.angle) * 30;
            const camX = shipState.x + Math.sin(shipState.angle) * 120;
            const camZ = shipState.z + Math.cos(shipState.angle) * 120;

            camera.position.x += (camX - camera.position.x) * 0.05;
            camera.position.z += (camZ - camera.position.z) * 0.05;
            camera.position.y += (80 - camera.position.y) * 0.05;

            // Screen shake
            if (shake > 0) {
                camera.position.x += (Math.random() - 0.5) * shake;
                camera.position.z += (Math.random() - 0.5) * shake;
                shake *= 0.9;
            }

            camera.lookAt(shipState.x, 10, shipState.z);

            // Move point light near ship
            pointLight.position.set(shipState.x, 50, shipState.z);

            renderer.render(scene, camera);
        }

        // --- Resize ---
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Init ---
        window.addEventListener('load', () => {
            setupControls();
            window.addEventListener('resize', onResize);
            document.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
            document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
            document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

            // Start render loop for menu background
            loopRunning = true;
            loop();
        });
    </script>
</body>
</html>
